apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-config
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets
  interval: 10m
  path: ./secrets/external-secrets-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: secrets
  wait: true
