apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8up
  namespace: flux-system
spec:
  dependsOn:
    - name: external-secrets-config
  interval: 10m
  path: ./backup
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: backup
  wait: true
