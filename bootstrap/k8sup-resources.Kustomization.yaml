apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8sup-resources
  namespace: flux-system
spec:
  dependsOn:
    - name: k8sup-controller
  interval: 10m
  path: ./backup/k8sup-resources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: backup
  wait: true
