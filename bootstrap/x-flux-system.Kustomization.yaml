apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: x-flux-system
  namespace: flux-system
spec:
  dependsOn:
    - name: monitoring
  interval: 10m
  path: ./flux-system
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: flux-system
  wait: true
