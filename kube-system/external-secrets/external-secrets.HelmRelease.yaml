apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: external-secrets
      version: 2.5.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: kube-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    bitwarden-sdk-server:
      enabled: true
    installCRDs: true
