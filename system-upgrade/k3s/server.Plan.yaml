---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  serviceAccountName: system-upgrade
  upgrade:
    envs:
      - name: SYSTEM_UPGRADE_K3S_STATE_DIR
        value: /home/me/.rancher/k3s
    image: rancher/k3s-upgrade@sha256:471084010ecf1bc6e4b9544529400bf47c8da3d268e2f67fa239dacd735c0083
  version: v1.35.2+k3s1
