---
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: server
spec:
  concurrency: 1
  cordon: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: In
        values:
          - "true"
  serviceAccountName: system-upgrade
  upgrade:
    envs:
      - name: SYSTEM_UPGRADE_K3S_STATE_DIR
        value: /home/me/.rancher/k3s
    image: rancher/k3s-upgrade@sha256:5b6936ab682b1221ae61e3ccb6d2eb0cb1e8249b3faeea2d7b5e1084233470b8
  version: v1.36.2+k3s1
