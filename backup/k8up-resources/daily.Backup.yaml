---
apiVersion: k8up.io/v1
kind: Schedule
metadata:
  name: daily
spec:
  backend:
    repoPasswordSecretRef:
      name: restic
      key: password
    s3:
      endpoint: https://942d7eb18ddb4433389d1376141361bb.eu.r2.cloudflarestorage.com
      bucket: backup
      accessKeyIDSecretRef:
        name: s3-credentials
        key: accessKeyID
      secretAccessKeySecretRef:
        name: s3-credentials
        key: accessKeySecret
  backup:
    schedule: '*/5 * * * *'
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
    # optional
    #promURL: https://prometheus-io-instance:8443
  check:
    schedule: '0 1 * * 1'
    # optional
    #promURL: https://prometheus-io-instance:8443
  prune:
    schedule: '0 1 * * 0'
    retention:
      keepLast: 5
      keepDaily: 14
