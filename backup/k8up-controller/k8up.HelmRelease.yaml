apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: k8up
spec:
  interval: 10m
  chart:
    spec:
      chart: k8up
      version: 4.9.0
      sourceRef:
        kind: HelmRepository
        name: k8up
        namespace: backup
  upgrade:
    crds: CreateReplace
  values:
    k8up:
      envVars:
        - name: BACKUP_SKIP_WITHOUT_ANNOTATION
          value: "true"
